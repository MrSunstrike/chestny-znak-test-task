{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">Авторизация</h1>
                    <form method="post">
                        {% csrf_token %}
                        {% if form.non_field_errors %}
                            <div class="alert alert-danger">
                                {{ form.non_field_errors }}
                            </div>
                        {% endif %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">Логин</label>
                            <input type="text" name="username" autofocus required id="id_username" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="id_password" class="form-label">Пароль</label>
                            <input type="password" name="password" required id="id_password" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                        <a href="{% url 'users:register' %}" class="btn btn-outline-secondary w-100 mt-2">Регистрация</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
